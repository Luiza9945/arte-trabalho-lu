<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/home.css">
    <title>Home</title>
</head>

<body>
<header class="d-flex flex-column">
        <div class="linha1 d-flex justify-content-between align-items-center px-3 pt-3">
            <div class="logo d-flex align-items-center">
                <img src="imgs/Usuária.jpg" alt="Logo do site" class="img-fluid " style="max-height: 40px;">
            </div>
            <h3 class="mb-0">Home</h3>
            <div class="notificacoes">
                <i class="bi bi-bell-fill fs-4"></i>
            </div>
        </div>
        <div class="linha2 px-4 pb-3">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Pesquisar...">
                <button class="btn btn-outline-light" type="button"><i class="bi bi-search"></i></button>
            </div>
        </div>
    </header>

<main class="flex-grow-1">
       
        <div class="linha4">
            <div class="hashtags d-flex flex-wrap justify-content-center">
<span class="badge bg-transparent text-white me-2 mb-2">#arte</span>
<span class="badge bg-transparent text-white me-2 mb-2">#design</span>
<span class="badge bg-transparent text-white me-2 mb-2">#ilustração</span>
<span class="badge bg-transparent text-white me-2 mb-2">#pintura</span>
<span class="badge bg-transparent text-white me-2 mb-2">#escultura</span>
            </div>
        </div>

    </main>

<footer class="mt-auto">
        <div class="icons d-flex justify-content-around align-items-center py-3 px-4">
            <i class="bi bi-house-fill fs-4"></i>
            <i class="bi bi-search"></i>
            <i class="bi bi-plus-circle fs-5"></i>
            <i class="bi bi-envelope-open-fill fs-4"></i>
            <i class="bi bi-person-fill fs-4"></i>
            
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
