<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/home.css">
    <title>Home</title>
</head>

<body>
    <!-- ESTRUTRA
     heard{
        linha1. icon logo ,h3 "home" , icon de notificação 
        linha2. barra de pesquisa
     }
     main{
        linha3. carrosel 3 pg (destaques , artistas do ano e empresas contratantes)
        linha4. fileira de # mais usadas 
        linha5. cards de artes
        }
        footer{ linha6. menu de navegação (icons: home , sobre , criar arte ,chat, perfil ,)}-->

<header class="d-flex flex-column">
        <div class="linha1 d-flex justify-content-between align-items-center px-3 pt-3">
            <div class="logo d-flex align-items-center">
                <img src="..." alt="Logo do site" class="img-fluid me-2" style="max-height: 40px;">
                <h3 class="mb-0">Home</h3>
            </div>
            <div class="notificacoes">
                <i class="bi bi-bell-fill fs-4"></i>
            </div>
        </div>
        <div class="linha2 px-4 pb-3">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="Pesquisar...">
                <button class="btn btn-outline-light" type="button"><i class="bi bi-search"></i></button>
            </div>
        </div>
    </header>

<main class="flex-grow-1">
        <div class="linha3">
            <div id="carouselExampleIndicators" class="carousel slide mx-auto" style="max-width: 800px;">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                        class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                        aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                        aria-label="Slide 3"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="1.jpg" class="d-block w-100 img-fluid" alt="Destaques">
                    </div>
                    <div class="carousel-item">
                        <img src="2.jpg" class="d-block w-100 img-fluid" alt="Artistas do ano">
                    </div>
                    <div class="carousel-item">
                        <img src="3.jpg" class="d-block w-100 img-fluid" alt="Empresas contratantes">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
        <div class="linha4">
            <div class="hashtags d-flex flex-wrap justify-content-center">
                <span class="badge bg-light text-dark me-2 mb-2">#arte</span>
                <span class="badge bg-light text-dark me-2 mb-2">#design</span>
                <span class="badge bg-light text-dark me-2 mb-2">#ilustração</span>
                <span class="badge bg-light text-dark me-2 mb-2">#pintura</span>
                <span class="badge bg-light text-dark me-2 mb-2">#escultura</span>
            </div>
        </div>
        <div class="linha5">
            <div class="container">
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5 class="card-title">Arte 1</h5>
                                <p class="card-text">Exemplo de arte compartilhada.</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5 class="card-title">Arte 2</h5>
                                <p class="card-text">Exemplo de arte compartilhada.</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5 class="card-title">Arte 3</h5>
                                <p class="card-text">Exemplo de arte compartilhada.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

<footer class="mt-auto">
        <div class="icons d-flex justify-content-around align-items-center py-3 px-4">
            <i class="bi bi-house-fill fs-4"></i>
            <i class="bi bi-stars fs-4"></i>
            <i class="bi bi-plus-circle fs-5"></i>
            <i class="bi bi-envelope-open-fill fs-4"></i>
            <i class="bi bi-person-fill fs-4"></i>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
