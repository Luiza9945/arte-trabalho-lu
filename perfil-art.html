<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/perfil-art.css">
    <title>Seu perfil</title>
</head>
<body>

<!-- DESCRIÇÃO 
 heard{
 linha1. icon seta para voltar , icon de 3 pontos
 linha2. foto de perfil do usuario 
 linha3. numero de seguidores, numero de curtidas , numero de usuarios que o usuario segue
}
 
main{
linha4.biografia , texto das infor do usuario , button com icon que leva para outra pagina
linha5. portifolio do usuario , cards com as artes }

footer{menu de navegação (icons: home , sobre , criar arte ,chat, perfil ,)
}-->

<header class="pb-4">
    <div class="linha1 d-flex justify-content-between align-items-center px-3">
        <div class="voltar">
            <a href="home.html"><i class="bi bi-arrow-left fs-3"></i></a>
        </div>
        <div class="opcoes">
            <i class="bi bi-three-dots-vertical fs-3"></i>
        </div>
    </div>
    <div class="linha2 text-center pb-3">
        <div class="foto-perfil d-inline-block">
            <img src="#" alt="Foto de perfil do usuário" class="img-fluid rounded-circle" style="width: 120px; height: 120px; object-fit: cover;">
        </div>
    </div>
    <div class="linha3 row text-center">
        <div class="col-4"><span>100 Seguidores</span></div>
        <div class="col-4"><span>200 Curtidas</span></div>
        <div class="col-4"><span>150 Seguindo</span></div>
    </div>
</header>


<main class="pb-4">
    <div class="linha4 container pb-4">
        <div class="row">
            <div class="col-12">
                <h2 class="text-center mb-3">Biografia</h2>
                <p class="text-center lead">Texto com as informações do usuário.</p>
                <div class="text-center">
                    <button class="btn btn-outline-primary"><i class="bi bi-person me-2"></i>Ver Perfil Completo</button>
                </div>
            </div>
        </div>
    </div>
    <div class="linha5 container">
        <h2 class="text-center mb-4">Portfólio</h2>
        <div class="row g-4">
            <div class="col-sm-6 col-md-4">
                <div class="card h-100">
                    <img src="#" alt="Arte 1" class="card-img-top img-fluid" style="height: 200px; object-fit: cover;">
                </div>
            </div>
            <div class="col-sm-6 col-md-4">
                <div class="card h-100">
                    <img src="#" alt="Arte 2" class="card-img-top img-fluid" style="height: 200px; object-fit: cover;">
                </div>
            </div>
            <div class="col-sm-6 col-md-4">
                <div class="card h-100">
                    <img src="#" alt="Arte 3" class="card-img-top img-fluid" style="height: 200px; object-fit: cover;">
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="mt-auto">
    <nav class="d-flex justify-content-around align-items-center py-3 px-4">
        <a href="home.html" class="text-center text-decoration-none">
            <i class="bi bi-house-fill fs-4 d-block mb-1"></i>
            <small>Home</small>
        </a>
        <a href="#" class="text-center text-decoration-none">
            <i class="bi bi-stars fs-4 d-block mb-1"></i>
            <small>Sobre</small>
        </a>
        <a href="#" class="text-center text-decoration-none">
            <i class="bi bi-plus-circle fs-5 d-block mb-1"></i>
            <small>Criar Arte</small>
        </a>
        <a href="#" class="text-center text-decoration-none">
            <i class="bi bi-envelope-open-fill fs-4 d-block mb-1"></i>
            <small>Chat</small>
        </a>
        <a href="perfil-art.html" class="text-center text-decoration-none">
            <i class="bi bi-person-fill fs-4 d-block mb-1"></i>
            <small>Perfil</small>
        </a>
    </nav>
</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
