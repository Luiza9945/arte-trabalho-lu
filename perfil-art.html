<!DOCTYPE html>
<html lang="pt-br">
<head>

<body>

<!-- DESCRIÇÃO 
 heard{
 linha1. icon seta para voltar , icon de 3 pontos
 linha2. foto de perfil do usuario 
 linha3. numero de seguidores, numero de curtidas , numero de usuarios que o usuario segue
}
 
main{
linha4.biografia , texto das infor do usuario , button com icon que leva para outra pagina
linha5. portifolio do usuario , cards com as artes }

footer{menu de navegação (icons: home , sobre , criar arte ,chat, perfil ,)
}-->

<header>
    <div class="linha1">
        <div class="voltar">
            <img src="#" alt="Ícone de seta para voltar">
        </div>
        <div class="opcoes">
            <img src="#" alt="Ícone de 3 pontos">
        </div>
    </div>
    <div class="linha2">
        <div class="foto-perfil">
            <img src="#" alt="Foto de perfil do usuário">
        </div>
    </div>
    <div class="linha3">
        <span>100 Seguidores</span>
        <span>200 Curtidas</span>
        <span>150 Seguindo</span>
    </div>
</header>


<main>
    <div class="linha4">
        <h2>Biografia</h2>
        <p>Texto com as informações do usuário.</p>
        <button><img src="#" alt="Ícone de perfil"> Ver Perfil Completo</button>
    </div>
    <div class="linha5">
        <h2>Portfólio</h2>
        <div class="cards">
            <div class="card">
                <img src="#" alt="Arte 1">
            </div>
            <div class="card">
                <img src="#" alt="Arte 2">
            </div>
            <div class="card">
                <img src="#" alt="Arte 3">
            </div>
        </div>
    </div>
</main>

<footer>
    <nav>
        <ul>
            <li><a href="#"><img src="#" alt="Ícone de Home"> Home</a></li>
            <li><a href="#"><img src="#" alt="Ícone de Sobre"> Sobre</a></li>
            <li><a href="#"><img src="#" alt="Ícone de Criar Arte"> Criar Arte</a></li>
            <li><a href="#"><img src="#" alt="Ícone de Chat"> Chat</a></li>
            <li><a href="#"><img src="#" alt="Ícone de Perfil"> Perfil</a></li>
        </ul>
    </nav>
</footer>
