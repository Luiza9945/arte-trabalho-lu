<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Cadastro</title>
    <link rel="stylesheet" href="css/login.css">

</head>

<body>

    <div class="vlt">
      <a href="login.html">
        <i class="bi bi-arrow-left"></i></a>
    </div>

  <h1>Cadastro</h1>

  <form id="form-cadastro">
    <div class="mb-3">
      <label for="nome" class="form-label">Nome</label>
      <input type="text" class="form-control" id="nome" name="nome" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">E-mail</label>
      <input type="email" class="form-control" id="email" name="email" required>
    </div>
    <div class="mb-3">
      <label for="senha" class="form-label">Senha</label>
      <input type="password" class="form-control" id="senha" name="senha" required>
    </div>
    <div class="mb-3">
      <label for="confirmar-senha" class="form-label">Confirme sua senha</label>
      <input type="password" class="form-control" id="confirmar-senha" name="confirmar-senha" required>
    </div>
    <button type="submit" class="btn btn-primary">REGISTRE-SE</button>
    <p>Ja tenho conta? <a href="login.html">Faça login</a></p>
  </form>

  <p>ou</p>

  <div class="icons">
     <i class="bi bi-google"></i>
     <i class="bi bi-facebook"></i>
     <i class="bi bi-linkedin"></i>
     <i class="bi bi-apple"></i>
  </div>

    <div class="spinning-circle2"></div>
    <div class="spinning-circle"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/login.js"></script>
</body>

</html>
