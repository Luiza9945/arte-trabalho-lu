<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/cadastro.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <title>Cadastro</title>
</head>

<body>
    <div class="vlt">
      <a href="index.html">
        <i class="bi bi-arrow-left"></i></a>
    </div>

  <h1>Cadastro</h1>
  
<form id="form-login" class="col-md-6 mx-auto">
 
     <div class="input-group">
      <input id="nome" type="text" class="form-control" id="exampleInputName" aria-describedby="nameHelp" required>
      <label for="exampleInputName" class="form-label">Nome</label>
    </div>
    <div class="input-group">
      <input id="email" type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
      <label for="exampleInputEmail1" class="form-label">E-mail</label>
    </div>
    <div class="input-group">
      <input id="senha" type="password" class="form-control" id="exampleInputPassword1" required>
      <label for="exampleInputPassword1" class="form-label">Senha</label>
    </div>
    <div class="input-group">
      <input id="confirmarSenha" type="password" class="form-control" id="exampleInputPassword1" required>
      <label for="exampleInputPassword1" class="form-label">Confirmar Senha</label>
    </div>
    <div class="form-text"><a href="#">Esqueci minha senha</a></div>
    <button id="btnCadas" type="submit" class="btn btn-primary w-100   ">Cadastrar</button>
    <p class="text-center">Já possui uma conta? <a href="login.html">Entre</a></p>
  </form>

  <p>ou</p>

  <div class="icons">
     <i class="bi bi-google"></i>
     <i class="bi bi-facebook"></i>
     <i class="bi bi-linkedin"></i>
     <i class="bi bi-apple"></i>
    </div>

  <script src="js/cadastro.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
